name: Feature request
description: Suggest an improvement or new feature
labels: [enhancement]

body:
  - type: markdown
    attributes:
      value: |
        Feature requests are welcome. Please describe the problem you're solving,
        not just the solution — there may be a simpler way to address it.

  - type: textarea
    id: problem
    attributes:
      label: What problem does this solve?
      description: Describe the situation where you run into this limitation today.
      placeholder: "e.g. I often copy database connection strings that I don't want saved in history..."
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How would you like it to work?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered
      description: Any other approaches or workarounds you've tried?

  - type: dropdown
    id: willing
    attributes:
      label: Would you be willing to implement this?
      options:
        - "Yes"
        - "Maybe, with some guidance"
        - "No"
