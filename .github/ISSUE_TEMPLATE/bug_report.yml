name: Bug report
description: Something isn't working
labels: [bug]

body:
  - type: markdown
    attributes:
      value: |
        Thanks for taking the time to report a bug.
        Please fill in as much detail as you can — it saves a lot of back-and-forth.

  - type: input
    id: version
    attributes:
      label: Version
      description: Run `clipboard-manager --version` or check the installed package version.
      placeholder: "e.g. 1.2.0"
    validations:
      required: true

  - type: input
    id: os
    attributes:
      label: Ubuntu version
      placeholder: "e.g. Ubuntu 24.04"
    validations:
      required: true

  - type: dropdown
    id: session
    attributes:
      label: Display session
      options:
        - X11 (Ubuntu on Xorg)
        - Wayland (plain GNOME / Ubuntu default)
        - Not sure
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: A clear description of the bug.
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      placeholder: |
        1. Copy some text
        2. Press Ctrl+Alt+C
        3. ...
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log output (if any)
      description: Run `RUST_LOG=debug clipboard-manager` and paste relevant output here.
      render: shell
