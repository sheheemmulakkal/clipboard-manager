name: Release

on:
  push:
    tags:
      - 'v*'

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-release:
    name: Build and Release
    runs-on: ubuntu-22.04        # pin to LTS for stable GTK4 libs

    permissions:
      contents: write            # needed to create GitHub Release

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Cargo
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
            ~/.cargo/bin
            target
          key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}

      - name: Install system dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y \
            libgtk-4-dev \
            libglib2.0-dev \
            libx11-dev \
            libxtst-dev \
            libgdk-pixbuf-2.0-dev \
            pkg-config \
            build-essential

      - name: Install cargo-deb
        run: |
          if ! command -v cargo-deb &>/dev/null; then
            cargo install --locked cargo-deb
          fi

      - name: Build release .deb
        run: cargo deb

      - name: Get version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF#refs/tags/}" >> $GITHUB_OUTPUT

      - name: Find .deb file
        id: deb
        run: |
          DEB=$(ls target/debian/*.deb | head -1)
          echo "DEB_PATH=$DEB" >> $GITHUB_OUTPUT
          echo "NAME=$(basename $DEB)" >> $GITHUB_OUTPUT

      - name: Create GitHub Release and upload .deb
        uses: softprops/action-gh-release@v2
        with:
          name: Clipboard Manager ${{ steps.version.outputs.VERSION }}
          body: |
            ## Install

            ### One-line install (recommended)
            ```bash
            curl -fsSL https://raw.githubusercontent.com/${{ github.repository }}/master/install.sh | bash
            ```

            ### Manual install
            Download the `.deb` file below and run:
            ```bash
            sudo apt install ./clipboard-manager_*.deb
            ```

            ### Upgrade from an older version
            Run the same install command above — it upgrades in-place and preserves your history and config.

            ### Requirements
            - Ubuntu 22.04 or newer (amd64)
            - X11 or Wayland session

            ### What's new
            See [CHANGELOG.md](https://github.com/${{ github.repository }}/blob/master/CHANGELOG.md) for details.
          files: ${{ steps.deb.outputs.DEB_PATH }}
          fail_on_unmatched_files: true
